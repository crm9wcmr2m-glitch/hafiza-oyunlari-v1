<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tetris</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
  h1.game-title-big { color: #e0e0ff; margin-bottom: 10px; }
  .tetris-wrap { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  #tetris-canvas { border: 3px solid #444; border-radius: 8px; background: #0d0d1a; display: block; }
  .side-panel { display: flex; flex-direction: column; gap: 16px; min-width: 120px; }
  .panel-box {
    background: #16213e; border: 2px solid #444; border-radius: 12px;
    padding: 12px; color: #e0e0ff; text-align: center;
  }
  .panel-box h3 { font-size: 0.85rem; color: #888; margin-bottom: 8px; text-transform: uppercase; }
  .panel-box .val { font-size: 1.8rem; font-weight: bold; color: #fff; }
  #next-canvas { background: #0d0d1a; border-radius: 6px; }
  .controls { color: #888; font-size: 0.8rem; line-height: 1.7; }
  .controls span { display: block; }
  #start-btn {
    background: #7c3aed; color: white; border: none; padding: 14px 28px;
    border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
    font-family: inherit; width: 100%;
  }
  #start-btn:hover { background: #6d28d9; }
  .back-btn { margin-bottom: 12px; }
  /* Mobil kontroller */
  .mobile-controls {
    display: none; gap: 8px; flex-direction: column; align-items: center; margin-top: 14px;
  }
  .mobile-controls .row { display: flex; gap: 8px; }
  .m-btn {
    width: 60px; height: 60px; background: #7c3aed; color: white; border: none;
    border-radius: 14px; font-size: 1.5rem; cursor: pointer; font-family: inherit;
  }
  .m-btn:active { background: #5b21b6; transform: scale(0.93); }
  @media (max-width: 600px) { .mobile-controls { display: flex; } .controls { display: none; } }
</style>
</head>
<body>
<a class="back-btn btn secondary" href="../index.html">⬅️ Menü</a>
<h1 class="game-title-big">🟦 Tetris</h1>
<div class="tetris-wrap">
  <canvas id="tetris-canvas" width="240" height="480"></canvas>
  <div class="side-panel">
    <div class="panel-box">
      <h3>Skor</h3>
      <div class="val" id="score">0</div>
    </div>
    <div class="panel-box">
      <h3>Seviye</h3>
      <div class="val" id="level">1</div>
    </div>
    <div class="panel-box">
      <h3>Sonraki</h3>
      <canvas id="next-canvas" width="80" height="80"></canvas>
    </div>
    <button id="start-btn">▶ Başla</button>
    <div class="panel-box controls">
      <span>← → Hareket</span>
      <span>↑ Döndür</span>
      <span>↓ Hızlı</span>
      <span>Space Düşür</span>
    </div>
  </div>
</div>
<div class="mobile-controls">
  <div class="row">
    <button class="m-btn" id="m-rot">🔄</button>
  </div>
  <div class="row">
    <button class="m-btn" id="m-left">⬅️</button>
    <button class="m-btn" id="m-down">⬇️</button>
    <button class="m-btn" id="m-right">➡️</button>
  </div>
  <div class="row">
    <button class="m-btn" id="m-drop" style="width:136px">⬇⬇ Düşür</button>
  </div>
</div>
<script src="../js/games/tetris.js"></script>
</body>
</html>
