<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pinpon</title>
<link rel="stylesheet" href="../css/style.css">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; width: 100%;
  height: 100vh; height: 100dvh;
  overflow: hidden;
  background: #000;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
}

/* Portrait uyarısı */
#portrait-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 999;
  background: #000;
  flex-direction: column; align-items: center; justify-content: center;
  color: white; text-align: center; gap: 20px;
  font-family: "Comic Sans MS", system-ui, sans-serif;
}
#portrait-overlay .icon { font-size: 5rem; animation: spin 2s linear infinite; }
#portrait-overlay p { font-size: 1.3rem; opacity: 0.85; padding: 0 30px; }
@keyframes spin { 0%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} 100%{transform:rotate(90deg)} }

@media (orientation: portrait) {
  #portrait-overlay { display: -webkit-flex; display: flex; }
  #game-container   { display: none; }
}

/* Oyun kabı */
#game-container {
  width: 100%; height: 100%;
  padding-left:  env(safe-area-inset-left,  0px);
  padding-right: env(safe-area-inset-right, 0px);
  display: -webkit-flex; display: flex;
  flex-direction: column;
}

/* Üst skor barı */
.score-bar {
  display: -webkit-flex; display: flex;
  -webkit-justify-content: space-between; justify-content: space-between;
  -webkit-align-items: center; align-items: center;
  padding: 6px 16px;
  padding-top: calc(6px + env(safe-area-inset-top, 0px));
  background: #111;
  color: white;
  font-family: "Comic Sans MS", system-ui, sans-serif;
  flex-shrink: 0;
}
.score-side { text-align: center; min-width: 80px; }
.score-side .name { font-size: 0.7rem; opacity: 0.6; }
.score-side .pts  { font-size: 1.6rem; font-weight: bold; }
.score-mid { display: -webkit-flex; display: flex; gap: 10px; -webkit-align-items: center; align-items: center; }
#btn-start {
  background: #22c55e; color: white; border: none;
  padding: 7px 18px; border-radius: 10px;
  font-size: 0.9rem; font-weight: bold; cursor: pointer;
  font-family: inherit; touch-action: manipulation;
}
#btn-start:active { background: #16a34a; }
#btn-pause {
  background: #374151; color: white; border: none;
  padding: 7px 14px; border-radius: 10px;
  font-size: 0.9rem; cursor: pointer;
  font-family: inherit; touch-action: manipulation;
}
#btn-pause:active { background: #1f2937; }

/* Canvas alanı */
.canvas-wrap {
  -webkit-flex: 1; flex: 1;
  position: relative; overflow: hidden;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
#pong-canvas {
  display: block;
  width: 100%; height: 100%;
  touch-action: none;
  cursor: default;
}

/* Dokunma ipucu */
.touch-hint {
  position: absolute; bottom: calc(8px + env(safe-area-inset-bottom,0px));
  left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.3); font-size: 0.72rem;
  font-family: "Comic Sans MS", system-ui, sans-serif;
  white-space: nowrap; pointer-events: none;
}
@media (pointer: fine) { .touch-hint { display: none; } }
</style>
</head>
<body>

<!-- Portrait uyarısı -->
<div id="portrait-overlay">
  <div class="icon">📱</div>
  <p>Telefonu <strong>yatay</strong> çevir ve Pinpon oyna! 🏓</p>
</div>

<!-- Oyun -->
<div id="game-container">
  <div class="score-bar">
    <div class="score-side">
      <div class="name">Sol 🟢</div>
      <div class="pts" id="score-l">0</div>
    </div>
    <div class="score-mid">
      <button id="btn-start">▶ Başla</button>
      <button id="btn-pause">⏸</button>
    </div>
    <div class="score-side">
      <div class="name">Sağ 🔵</div>
      <div class="pts" id="score-r">0</div>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="pong-canvas"></canvas>
    <div class="touch-hint">Sol yarı = Sol raket &nbsp;|&nbsp; Sağ yarı = Sağ raket &nbsp;|&nbsp; Parmağını sürükle</div>
  </div>
</div>

<script src="../js/games/pong.js"></script>
</body>
</html>
